<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Neon Escape</title>
    <script>src="https://cdn.tailwindcss.com"</script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #050505;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      touch-option: none;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      box-shadow: 0 0 50px rgba(0,255,255,0.1);
    }
    .ui-overlay {
      position: absolute;
      pointer-events: none;
      color: white;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
    }
    #start-screen, #game-over-screen {
      pointer-events: auto;
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
      z-index: 10;
    }
    .neon-button {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
      padding: 0.75rem 2rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      border-radius: 0.5rem;
    }
    .neon-button:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
    }
    #score-display {
      top: 20px;
      left: 20px;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.05em;
    }      
  </style>
</head>
<body>

  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="score-display"> class="ui-overlay">SCORE: 0</div>

    <!-- Start Screen-->
    <div id="start-screen" class="ui-overlay flex flex-col items-center">
      <h1 class="text-4xl font-black mb-4 text-cyan-400">CYBER-NEON ESCAPE</h1>
      <p class="mb-2 text-grey-300">Dodge the red pulses. Stay alive.</p>
      <p class="mb-6 text-yellow-400 font-bold">Collect Yellow Fragments for +50 points!</p>
      <div class="text-sm text-gray-500 mb-8">
        Keyboard: Arrow Keys | Mobile: Drag Finger
      </div>
      <button id="start-btn" class="neon-button">Initiate System</button>
    </div>

    <!--Game Over Screen-->
    <div id="game-over-screen" class="ui-overlay flex flex-col items-center hidden">
      <h2 class="text-3xl font-black mb-2 text-red-500">CONNECTION LOST</h2>
      <p id="final-score" class="text-xl mb-6">FINAL SCORE: 0</p>
      <button id="restart-btn" class="neon-button">Reboot</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score-display');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreElement = document.getElementById('final-score');

    // Game State
    let gameActive = false;
    let score = 0;
    let player;
    let enemies = [];
    let collectibles = [];
    let particles = [];
    let animationId;
    let spawnRate = 1000;
    let lastSpawnTime = 0;
    let lastCollectibleTime = 0;
    let difficultyMultiplier = 1;

    // Responsive sizing
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if (player) {
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
      }
    }
    window.addEventListener('resize', resize);
    resize();

    class Player {
      constructor() {
        this.radius = 12;
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.color = '#00ffff';
        this.speed = 7;
        this.trial = [];
      }

      draw() {
        this.trail.forEach((p, i) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, this.radius * (i / this.trail.length), 0, Math.PI * 2);
  </script>
</body>
